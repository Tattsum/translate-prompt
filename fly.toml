app = "translate-prompt-api"
primary_region = "nrt"

[build]
  dockerfile = "Dockerfile"

[env]
  LISTEN_HOST = "0.0.0.0"
  ENV = "production"
  INVESTIGATE_ENABLED = "false"
  ALLOWED_ORIGINS = "https://translate.tattsum.com"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
