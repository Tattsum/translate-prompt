name: Renovate

on:
  schedule:
    # 月曜 10:00 JST (01:00 UTC)
    - cron: "0 1 * * 1"
  workflow_dispatch:

concurrency:
  group: renovate
  cancel-in-progress: true

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  renovate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Renovate
        uses: renovatebot/github-action@v46.1.17
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
